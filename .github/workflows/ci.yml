name: CI

# The contract gate for brand-tokens itself. Before this existed, nothing
# verified the system on a PR — a malformed meta.json, a hex literal in a
# component, or a stale artifact could land clean. This closes that gap.

on:
  push:
    branches: ['**']
  pull_request:
  # Dispatched by update-visual-baselines.yml after its bot commit: pushes made
  # with GITHUB_TOKEN don't trigger push/PR runs (they land as "action required"),
  # but workflow_dispatch is exempt — this re-attaches a real `verify` check to
  # the branch head without a human pressing re-run.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22 # fs.promises.glob (used by validate + build:meta) requires Node 22+
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Validate — schema, lint rules, reference resolution
        run: npm run validate

      - name: Lint Storybook stories — token rules (incl. story-ui generated)
        run: npm run lint:stories

      - name: Build all brand CSS
        run: npm run build

      - name: Rebuild generated artifacts (CEM + design-system.json)
        run: npm run build:meta

      - name: Fail if committed artifacts are stale
        run: |
          if ! git diff --exit-code -- design-system.json packages/components/custom-elements.json; then
            echo "::error::Generated artifacts are out of date. Run 'npm run build:meta' and commit the result."
            exit 1
          fi

      # Component docs are generated from design-system.json (fresh, above) + the
      # token store. Only the GEN regions regenerate; AUTHORED prose is preserved,
      # so this diff catches stale metadata-derived docs without touching authoring.
      - name: Regenerate component docs (portable MDX)
        run: npm run docs:components

      - name: Fail if committed component docs are stale
        run: |
          if ! git diff --exit-code -- docs/components; then
            echo "::error::Component docs are out of date. Run 'npm run docs:components' and commit the result."
            exit 1
          fi

      # docs/index.html's color-primitives section is generated from
      # tokens/primitives/color.tokens.json (the rest is hand-authored HTML,
      # preserved via markers). Same staleness idiom as above.
      - name: Regenerate token reference docs (docs/index.html)
        run: npm run docs

      - name: Fail if committed token reference docs are stale
        run: |
          if ! git diff --exit-code -- docs/index.html; then
            echo "::error::docs/index.html is out of date. Run 'npm run docs' and commit the result."
            exit 1
          fi

      - name: Test (components + mcp)
        run: npm test --workspaces --if-present

      # `npm test --workspaces` skips the repo root — run the token-tree
      # sanity tests (tests/unit) explicitly.
      - name: Test (root token sanity)
        run: npm run test:unit -- --run

      # Storybook is how the rr-* components (and story-ui's output) are viewed.
      # Building it in CI proves the stories still compile against the tokens and
      # the component barrel — the dist build is required for the barrel import.
      - name: Build components (dist for the Storybook barrel import)
        run: npm run build --workspace @digital2analogue2/parsimony-components

      - name: Build Storybook
        run: npm run build-storybook --workspace @digital2analogue2/parsimony-components

      # Visual regression over the built Storybook — one screenshot per story,
      # compared against committed linux baselines (generated by the
      # "Update visual baselines" workflow, never locally). This is the net
      # that catches a token change shifting component rendering HERE instead
      # of in a consumer repo.
      # Bootstrap note: if no baselines are committed yet, the suite is
      # skipped with a warning instead of failing — workflow_dispatch only
      # works once update-visual-baselines.yml exists on the default branch,
      # so the very first baselines can't exist before this file lands.
      # Dispatch "Update visual baselines" on a branch to bootstrap them.
      - name: Visual regression (components)
        run: |
          if [ -d packages/components/tests/visual/__screenshots__ ]; then
            (cd packages/components && npx playwright install --with-deps chromium)
            npm run test:visual --workspace @digital2analogue2/parsimony-components
          else
            echo "::warning::No visual baselines committed yet — dispatch the 'Update visual baselines' workflow on a branch to bootstrap them. Visual regression SKIPPED."
          fi

      - name: Upload visual diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/components/playwright-report
          retention-days: 7
