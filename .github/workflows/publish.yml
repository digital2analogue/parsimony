name: Publish @riverromney/tokens

# On-demand only — never publishes automatically. Trigger from the Actions tab
# (workflow_dispatch) or by pushing a tag like `tokens-v0.1.0`.
#
# Target: the public npm registry, scope @riverromney. Public npm decouples the
# package scope from the GitHub repo owner, so this repo stays under
# `digital2analogue` with no transfer and the Vercel wiring untouched.
#
# PREREQUISITES (one-time, owner-only):
#   1. Own the @riverromney scope on npmjs.com — create the free `riverromney`
#      npm organization (public scoped packages are free).
#   2. Create an npm "Automation" access token and add it to this repo as the
#      Actions secret `NPM_TOKEN`.

on:
  workflow_dispatch:
  push:
    tags:
      - 'tokens-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@riverromney'

      - name: Install
        run: npm ci

      - name: Build token CSS
        run: npm run build --workspace @riverromney/tokens

      - name: Publish to npm
        run: npm publish --workspace @riverromney/tokens --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
