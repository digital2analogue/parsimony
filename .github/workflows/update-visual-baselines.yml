# Regenerates the component visual-regression baselines ON the CI runner
# and commits them to the branch the workflow runs on. Dispatch it from the
# Actions tab after an intentional visual change — baselines must be
# generated on the same environment CI compares on, or font rasterization
# drift causes false failures. Dispatch it LAST, after your final push to
# the branch: it commits back, so pushing mid-run races its push.
name: Update visual baselines

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch ci.yml after the baselines commit

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: packages/components

      - name: Regenerate baselines (builds components + Storybook first)
        run: npm run test:visual:update

      - name: Commit refreshed baselines
        id: commit
        run: |
          if [ -z "$(git status --porcelain -- packages/components/tests/visual/__screenshots__)" ]; then
            echo "Baselines unchanged — nothing to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/components/tests/visual/__screenshots__
          git commit -m "chore: regenerate visual baselines on CI runner"
          # The branch can move while baselines regenerate — rebase our
          # baseline commit on top (favouring the fresh screenshots) and retry.
          for i in 1 2 3; do
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git pull --rebase -X theirs origin "$GITHUB_REF_NAME"
          done
          exit 1

      # A GITHUB_TOKEN push never triggers push/PR workflows, so the PR's CI
      # run lands gated at "action required". workflow_dispatch is exempt from
      # that rule — dispatching ci.yml here attaches a fresh `verify` check to
      # the new branch head with no human re-run needed.
      - name: Re-trigger CI on the baselines commit
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$GITHUB_REF_NAME"
