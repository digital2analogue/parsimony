<!-- Brand web fonts. The token CSS only sets font-family: 'Space Grotesk'
     (and Spectral / JetBrains Mono) with no fallback, so without loading the
     actual font files every component silently falls back to a system face.
     Same families/weights as docs/index.html — keep them in sync. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Spectral:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>

<style>
  /* Match the iframe body to the token canvas so there is no white gutter
     around the decorator. The --color-* var is defined once variables.css is
     imported in preview.ts. */
  body {
    background: var(--color-background-default);
    margin: 0;
  }
</style>
