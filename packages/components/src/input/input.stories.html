<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rr-input — Dev Stories</title>
  <link rel="stylesheet" href="../../../../build/css/variables.css" />
  <style>
    body {
      background: var(--color-background-default);
      color: var(--color-foreground-default);
      font: var(--font-body-large);
      padding: 2rem;
      margin: 0;
    }
    h1 { font: var(--font-title-large); margin-bottom: 1rem; }
    h2 { font: var(--font-title-small); margin: 2rem 0 0.75rem; }
    .section {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--color-background-alt);
      border-radius: var(--radius-lg);
      max-width: 400px;
    }
    .section rr-input {
      margin-bottom: 1rem;
    }
    form {
      max-width: 400px;
    }
  </style>
  <script type="module" src="./input.ts"></script>
</head>
<body>
  <h1>rr-input</h1>

  <div class="section">
    <h2>Default</h2>
    <rr-input label="Email" placeholder="you@example.com"></rr-input>
  </div>

  <div class="section">
    <h2>With helper text</h2>
    <rr-input label="Username" helper-text="Must be 3-20 characters" placeholder="choose a username"></rr-input>
  </div>

  <div class="section">
    <h2>Error state</h2>
    <rr-input label="Email" value="bad" error-text="Invalid email address"></rr-input>
  </div>

  <div class="section">
    <h2>Required</h2>
    <rr-input label="Full name" required placeholder="Jane Doe"></rr-input>
  </div>

  <div class="section">
    <h2>Disabled</h2>
    <rr-input label="Locked field" value="Cannot edit this" disabled></rr-input>
  </div>

  <div class="section">
    <h2>Password</h2>
    <rr-input label="Password" type="password" placeholder="••••••••"></rr-input>
  </div>

  <div class="section">
    <h2>Form participation</h2>
    <form id="demo-form" onsubmit="event.preventDefault(); alert(JSON.stringify(Object.fromEntries(new FormData(this))));">
      <rr-input label="First name" name="first" required></rr-input>
      <rr-input label="Last name" name="last"></rr-input>
      <button type="submit" style="margin-top: 1rem; padding: 8px 16px; cursor: pointer;">Submit</button>
    </form>
  </div>
</body>
</html>
